<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>typetest — minimal typing test</title>

  <!-- JetBrains Mono from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- App shell -->
  <main class="app">
    <!-- Top bar: mode selector + live stats -->
    <header class="topbar">
      <!-- Mode selector: type (time/words) + amount -->
      <nav class="modes" id="modes" aria-label="Test mode">
        <div class="mode-group" id="typeGroup" role="group" aria-label="Mode type">
          <button class="mode" type="button" data-type="time">time</button>
          <button class="mode" type="button" data-type="words">words</button>
          <button class="mode mode-inf" type="button" data-type="infinite"
                  title="infinite — no limit, press Enter to finish"
                  aria-label="infinite mode">∞</button>
        </div>
        <span class="mode-divider" aria-hidden="true"></span>
        <!-- Amount buttons injected by JS based on the active type -->
        <div class="mode-group" id="amountGroup" role="group" aria-label="Amount"></div>
      </nav>

      <!-- Live readouts (revealed once typing starts) -->
      <div class="live" id="live">
        <span class="live-timer" id="liveTimer">30</span>
        <span class="live-sep">·</span>
        <span class="live-wpm" id="liveWpm">0</span><span class="live-unit">wpm</span>
        <span class="live-sep">·</span>
        <span class="live-acc" id="liveAcc">100</span><span class="live-unit">%</span>
      </div>
    </header>

    <!-- Typing area -->
    <section class="test" id="test">
      <!-- Words render here as spans of per-character spans -->
      <div class="words" id="words" role="textbox" aria-label="Typing test" tabindex="0"></div>

      <!-- Hidden input captures keystrokes so mobile keyboards open -->
      <input
        id="capture"
        class="capture"
        type="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-hidden="true"
      />
    </section>

    <!-- Results screen (revealed on finish) -->
    <section class="results" id="results" aria-hidden="true">
      <div class="new-best" id="newBest">★ new best</div>
      <div class="results-grid">
        <div class="stat stat--hero">
          <span class="stat-value" id="resWpm">0</span>
          <span class="stat-label">wpm</span>
        </div>
        <div class="stat stat--hero">
          <span class="stat-value" id="resAcc">0%</span>
          <span class="stat-label">accuracy</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="resCorrect">0</span>
          <span class="stat-label">correct words</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="resErrors">0</span>
          <span class="stat-label">errors</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="resBest">0</span>
          <span class="stat-label">best wpm</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="resTime">0s</span>
          <span class="stat-label">time</span>
        </div>
      </div>
    </section>

    <!-- Restart control -->
    <footer class="bottombar">
      <button class="restart" id="restart" title="Restart (Tab or Esc)">restart</button>
      <p class="hint"><kbd>tab</kbd> / <kbd>esc</kbd> — restart · <kbd>enter</kbd> — finish</p>
    </footer>
  </main>

  <!-- In-app theme switcher (fixed bottom-right) -->
  <div class="theme-picker" id="themePicker">
    <button
      class="theme-toggle"
      id="themeToggle"
      type="button"
      aria-haspopup="true"
      aria-expanded="false"
      title="Change theme"
    >
      <span class="theme-dot" id="themeDot"></span>
      <span>theme</span>
    </button>
    <!-- Menu items injected by JS -->
    <div class="theme-menu" id="themeMenu" role="menu" hidden></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
